<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #0a0e17;
    color: #fff;
    overflow: hidden;
  }

  /* 背景动效 */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 60%);
    animation: bgShift 12s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, -3%) rotate(2deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 600px;
  }

  /* Logo / Brand */
  .brand {
    font-size: 3.5rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #6366f1, #ec4899, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  /* 齿轮动画 */
  .gear-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
  }

  .gear {
    width: 48px; height: 48px;
    animation: spin 4s linear infinite;
  }
  .gear:nth-child(2) {
    width: 36px; height: 36px;
    animation-direction: reverse;
    animation-duration: 3s;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .gear svg { fill: rgba(99, 102, 241, 0.6); }
  .gear:nth-child(2) svg { fill: rgba(236, 72, 153, 0.5); }

  /* 文字 */
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.3;
  }

  .desc {
    font-size: 1.05rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }

  /* 进度条 */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }

  .progress-bar::after {
    content: '';
    display: block;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #ec4899, #10b981);
    border-radius: 2px;
    animation: loading 2s ease-in-out infinite;
  }

  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  /* 底部信息 */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
  }

  .dot {
    width: 6px; height: 6px;
    background: #10b981;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* 装饰粒子 */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(99, 102, 241, 0.4);
    border-radius: 50%;
    animation: float 15s linear infinite;
  }

  .particle:nth-child(2) { left: 20%; animation-delay: -3s; animation-duration: 18s; background: rgba(236, 72, 153, 0.3); }
  .particle:nth-child(3) { left: 40%; animation-delay: -7s; animation-duration: 12s; }
  .particle:nth-child(4) { left: 60%; animation-delay: -5s; animation-duration: 20s; background: rgba(16, 185, 129, 0.3); }
  .particle:nth-child(5) { left: 80%; animation-delay: -2s; animation-duration: 16s; }
  .particle:nth-child(6) { left: 10%; animation-delay: -9s; animation-duration: 14s; background: rgba(236, 72, 153, 0.2); }
  .particle:nth-child(7) { left: 70%; animation-delay: -11s; animation-duration: 22s; }
  .particle:nth-child(8) { left: 90%; animation-delay: -6s; animation-duration: 13s; background: rgba(99, 102, 241, 0.3); }

  @keyframes float {
    0% { transform: translateY(100vh) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
  }

  @media (max-width: 480px) {
    .brand { font-size: 2.5rem; }
    h1 { font-size: 1.4rem; }
    .desc { font-size: 0.95rem; }
  }

  opacity: 0;
  cursor: pointer;
}
.imt-fb-container.left .imt-fb-pin-icon {
  left: auto;

}

.imt-fb-side:hover .imt-fb-pin-icon {
  opacity: 1;
}

.imt-fb-more-button {
  width: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
/* Sheet.css */
.immersive-translate-sheet {
  position: fixed;
  transform: translateY(100%);
  /* Start off screen */
  left: 0;
  right: 0;
  background-color: var(--background-color);
  transition: transform 0.3s ease-out;
  /* Smooth slide transition */
  box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.1);
  /* Ensure it's above other content */
  bottom: 0;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  overflow: hidden;
}

.immersive-translate-sheet.visible {
  transform: translateY(0);
}

.immersive-translate-sheet-backdrop {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(0, 0, 0, 0.5);
  opacity: 0;
  transition: opacity 0.3s ease-out;
}

.immersive-translate-sheet-backdrop.visible {
  opacity: 1;
}

.popup-container-sheet {
  max-width: 100vw;
  width: 100vw;
}

.imt-no-events svg * {
  pointer-events: none !important;
}

.imt-manga-button {
  width: 36px;
  height: 36px;
  display: flex;
  flex-direction: column;
  position: relative;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: all;
  margin: 0 0 10px 0;
  background-color: var(--float-ball-more-button-background-color);
  border-radius: 50%;
  box-shadow: 0 2px 10px 0 rgba(0, 0, 0, 0.08);
  right: 8px;
}

.imt-manga-feedback {
  cursor: pointer;
  margin-bottom: 10px;
}

.imt-fb-round-button {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: var(--float-ball-more-button-background-color);
  border-radius: 50%;
  box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.08);
  position: relative;
}

.imt-fb-round-button > svg {
  z-index: 1;
}

.imt-fb-upgrade-button {
  cursor: pointer;
  margin-top: 10px;
}

.imt-manga-translated {
  position: absolute;
  left: 24px;
  top: 20px;
}

.imt-float-ball-loading {

.imt-manga-guide-bg {

  z-index: -1;

.imt-manga-guide-content {
  position: absolute;

.img-manga-guide-button {

.imt-fb-icon {

/* 悬浮球设置弹窗样式 */
.imt-fb-setting-wrapper {
  border-radius: 12px;
  box-shadow: 2px 10px 24px 0px rgba(0, 0, 0, 0.06);
}

.imt-fb-setting-content {
  padding: 16px;
  width: 350px;
  pointer-events: all;
}

.imt-fb-setting-title {
  font-weight: 700;
  font-size: 16px;
  line-height: 24px;
  color: var(--text-black-2);
}

.imt-fb-setting-preview {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 24px 0;
}

.imt-fb-preview-wrapper {
  display: flex;
  border-radius: 12px;
  overflow: hidden;
}

.imt-fb-preview-item {
  width: 99px;
  height: 57px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
}

.imt-fb-preview-item.light {
  background-color: #f3f5f6;
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

.imt-fb-preview-item.dark {
  background-color: #444;
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

.imt-fb-preview-ball {
  height: 36px;
  display: flex;
  align-items: center;
  box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.08);
  transition: all 0.2s ease;
}

.imt-fb-preview-ball.light {
  background-color: #fff;
  border-top-left-radius: 36px;
  border-bottom-left-radius: 36px;
}

.imt-fb-preview-ball.dark {
  background-color: #111;
  border-top-left-radius: 36px;
  border-bottom-left-radius: 36px;
}

.imt-fb-preview-ball.full {
  width: 41px;
  justify-content: center;
}

.imt-fb-preview-ball.mini {
  width: 41px;
  justify-content: center;
  transform: translateX(21px);
}

.imt-fb-preview-ball .imt-fb-preview-logo {
  flex-shrink: 0;
}

/* 选项区域 */
.imt-fb-setting-options {
  margin-top: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.imt-fb-setting-option-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}

.imt-fb-setting-option-label {
  font-size: 14px;
  font-weight: 400;
  line-height: 21px;
  color: var(--text-black-2);
}

/* Toggle 开关样式 */
.imt-fb-toggle {
  width: 30px;
  height: 18px;
  background-color: var(--switch-background-color);
  border-radius: 24px;
  position: relative;
  cursor: pointer;
  transition: background-color 0.2s ease;
  flex-shrink: 0;
}

.imt-fb-toggle.checked {
  background-color: var(--primary);
}

.imt-fb-toggle.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.imt-fb-toggle-thumb {
  width: 14px;
  height: 14px;
  background-color: var(--switch-color);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: transform 0.2s ease;
  box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.08);
}

.imt-fb-toggle.checked .imt-fb-toggle-thumb {
  transform: translateX(12px);
}

.imt-fb-setting-hide-options {
  background-color: var(--background-light-green);
  padding: 8px 20px;
  border-radius: 8px;
  margin-top: 8px;
}

.imt-fb-setting-save-btn {
  background-color: var(--primary);
  color: white;
  border-radius: 8px;
  text-align: center;
  line-height: 45px;
  height: 45px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s ease;
}

.imt-fb-setting-save-btn:hover {
  opacity: 0.9;
}

.imt-fb-setting-save-btn:active {
  opacity: 0.8;
}
